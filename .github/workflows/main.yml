name: Build FFAimbot dylib

on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --depth 1 --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install ldid
        run: |
          brew install ldid

      - name: Build
        run: |
          cd FFAimbotTweak
          export THEOS=$HOME/theos
          make package
          mkdir -p output
          cp packages/*.deb output/
          cp .theos/obj/debug/FFAimbot.dylib output/ || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FFAimbot
          path: FFAimbotTweak/output/
