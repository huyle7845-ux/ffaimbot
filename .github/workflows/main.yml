name: Build FFAimbot dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Get iOS SDK
        run: |
          curl -L "https://github.com/xybp888/iOS-SDKs/releases/download/17.5/iPhoneOS17.5.sdk.zip" -o /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d $HOME/theos/sdks/

      - name: Build Tweak
        run: |
          cd FFAimbotTweak
          make package
          mkdir -p output
          cp packages/*.deb output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFAimbot
          path: FFAimbotTweak/output/
